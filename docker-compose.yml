services:    backend:        build:            context: ./backend            dockerfile: Dockerfile        ports:            - "3001:3001"        environment:            - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}            - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}            - JWT_SECRET=${JWT_SECRET}            - COUCHDB_URL=http://couchdb:5984            - COUCHDB_ADMIN_USER=${COUCHDB_ADMIN_USER:-admin}            - COUCHDB_ADMIN_PASSWORD=${COUCHDB_ADMIN_PASSWORD}            - DATABASE_URL=/app/data/users.db            - PORT=3001            - BASE_URL=${BASE_URL:-http://localhost:3001}        volumes:            - backend_data:/app/data        depends_on:            couchdb:                condition: service_healthy        healthcheck:            test:                [                    "CMD",                    "bun",                    "-e",                    "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1))",                ]            interval: 10s            timeout: 5s            retries: 3            start_period: 5s    couchdb:        image: couchdb:3        ports:            - "5984:5984"        environment:            - COUCHDB_USER=${COUCHDB_ADMIN_USER:-admin}            - COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}        volumes:            - couchdb_data:/opt/couchdb/data        healthcheck:            test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]            interval: 10s            timeout: 5s            retries: 5            start_period: 10svolumes:    backend_data:    couchdb_data: