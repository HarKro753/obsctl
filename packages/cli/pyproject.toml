[project]
name = "obsidian-vault-cli"
version = "0.2.1"
description = "Obsidian vault CLI via CouchDB/LiveSync — read, write, search, graph traversal, tags, properties"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "requests>=2.28.0",
    "python-frontmatter>=1.0.0",
    "click>=8.0.0",
    "PyYAML>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.urls]
Repository = "https://github.com/HarKro753/obsctl"
Documentation = "https://github.com/HarKro753/obsctl/tree/main/packages/cli"

[project.scripts]
vault = "vault_cli.cli.main:cli"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["vault_cli*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
